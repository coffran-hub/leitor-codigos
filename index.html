<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BATELE VIDROS E ESQUADRIAS</title></title>

<meta name="theme-color" content="#06b6d4">

<meta name="description"
content="CONTROLE DE ROMANEIOS">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@zxing/library@latest"></script>

</head>

<body>

<div class="background-glow"></div>

<header class="topbar">

<div class="logo">

<div class="logo-icon">
📷
</div>

<div>
<h1>BATELE VIDROS E ESQUADRIAS</h1>
<p>LEITOR DE CODIGO DE BARRAS - QR CODE - CONTROLE DE ROMANEIOS</p>
</div>

</div>

<div class="status">
<span class="online-dot"></span>
Online
</div>
  <div class="stats-grid">

    <div class="stat-card">

        <h4>Hoje</h4>

        <span id="todayScans">
        0
        </span>

    </div>

    <div class="stat-card">

        <h4>QR Codes</h4>

        <span id="qrCount">
        0
        </span>

    </div>

    <div class="stat-card">

        <h4>Cód. Barras</h4>

        <span id="barcodeCount">
        0
        </span>

    </div>

</div>

</header>

<main class="container">

<section class="scanner-card">

<div class="card-header">

<h2>LEITOR</h2>

</div>

<div class="video-wrapper">

<video
id="video"
autoplay
muted
playsinline>
</video>

<div class="scan-overlay">

<div class="scan-box">

<div class="scan-line"></div>

</div>

</div>

</div>

<div class="camera-controls">

<button id="flashBtn">
💡 Flash
</button>

<button id="startBtn">
▶ Iniciar
</button>

<button id="stopBtn">
⏹ Parar
</button>

<div class="movement-card">

    <h3>Movimentação</h3>

    <div class="movement-selector">

        <input
        type="radio"
        id="entrada"
        name="movement"
        value="ENTRADA"
        checked>

        <label for="entrada">
            📥 Entrada
        </label>

        <input
        type="radio"
        id="saida"
        name="movement"
        value="SAIDA">

        <label for="saida">
            📤 Saída
        </label>

        <input
        type="radio"
        id="devolucao"
        name="movement"
        value="DEVOLUCAO">

        <label for="devolucao">
            🔄 Devolução
        </label>

    </div>

<div class="history-card">

    <div class="history-header">

        <h3>ITENS ESCANEADOS</h3>

    </div>

    <ul id="historyList">
    </ul>

</div>

</section>

<section class="result-card">

<div class="card-header">

<h2>Resultado Detectado</h2>

<span class="result-status">
Pronto
</span>

</div>

<textarea
id="result"
placeholder="Aguardando leitura..."
readonly>
</textarea>

<div class="result-actions">

<button id="copyBtn">
📋 Copiar
</button>

<button id="shareBtn">
📤 Compartilhar
</button>

<button id="searchBtn">
🔍 Pesquisar
</button>

<button id="clearBtn">
🗑 Limpar
</button>

</div>

</section>

<section class="upload-card">

<div class="card-header">
<h2>Scanner por Imagem</h2>
</div>

<label class="upload-area">

<input
type="file"
id="imageInput"
accept="image/*">

<div class="upload-content">

<div class="upload-icon">
🖼
</div>

<h3>Selecionar Imagem</h3>

<p>
Clique para enviar uma foto contendo
QR Code ou Código de Barras
</p>

</div>

</label>

<div class="stat-card">

<h3>Último Scan</h3>

<span id="lastScan">
-
</span>

</div>

</section>

<section class="history-card">

<div class="card-header">

<h2>Histórico</h2>

<div class="history-buttons">

<button id="exportBtn">
📄 CSV
</button>

<button id="clearHistoryBtn">
🗑 Histórico
</button>

</div>

</div>

<ul id="historyList">

</ul>

</section>

</main>

<div id="toast" class="toast">
Operação realizada
</div>

<footer>

<p>
Coffran © 2026
</p>

</footer>

<script src="scanner.js"></script>
<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register(
"./service-worker.js"
);

});

}

</script>

</body>

</html>
