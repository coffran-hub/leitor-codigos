<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Scanner Pro</title>

<meta name="theme-color" content="#06b6d4">

<meta name="description"
content="Scanner profissional de QR Code e Código de Barras">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@zxing/library@latest"></script>

</head>

<body>

<div class="background-glow"></div>

<header class="topbar">

<div class="logo">

<div class="logo-icon">
📷
</div>

<div>
<h1>Universal Scanner Pro</h1>
<p>QR Code • Barcode • DataMatrix • PDF417</p>
</div>

</div>

<div class="status">
<span class="online-dot"></span>
Online
</div>

</header>

<main class="container">

<section class="scanner-card">

<div class="card-header">

<h2>Scanner</h2>

<div class="scanner-badge">
Tempo Real
</div>

</div>

<div class="video-wrapper">

<video id="video" autoplay muted playsinline></video>

<div class="scan-overlay">

<div class="scan-box">

<div class="scan-line"></div>

</div>

</div>

</div>

<div class="camera-controls">

<select id="cameraSelect">
<option>
Selecionar câmera
</option>
</select>

<button id="flashBtn">
💡 Flash
</button>

<button id="startBtn">
▶ Iniciar
</button>

<button id="stopBtn">
⏹ Parar
</button>

</div>

</section>

<section class="result-card">

<div class="card-header">

<h2>Resultado Detectado</h2>

<span class="result-status">
Pronto
</span>

</div>

<textarea
id="result"
placeholder="Aguardando leitura..."
readonly>
</textarea>

<div class="result-actions">

<button id="copyBtn">
📋 Copiar
</button>

<button id="shareBtn">
📤 Compartilhar
</button>

<button id="searchBtn">
🔍 Pesquisar
</button>

<button id="clearBtn">
🗑 Limpar
</button>

</div>

</section>

<section class="upload-card">

<div class="card-header">
<h2>Scanner por Imagem</h2>
</div>

<label class="upload-area">

<input
type="file"
id="imageInput"
accept="image/*">

<div class="upload-content">

<div class="upload-icon">
🖼
</div>

<h3>Selecionar Imagem</h3>

<p>
Clique para enviar uma foto contendo
QR Code ou Código de Barras
</p>

</div>

</label>

</section>

<section class="stats-grid">

<div class="stat-card">

<h3>Total</h3>

<span id="totalScans">
0
</span>

</div>

<div class="stat-card">

<h3>Hoje</h3>

<span id="todayScans">
0
</span>

</div>

<div class="stat-card">

<h3>Último Scan</h3>

<span id="lastScan">
-
</span>

</div>

</section>

<section class="history-card">

<div class="card-header">

<h2>Histórico</h2>

<div class="history-buttons">

<button id="exportBtn">
📄 CSV
</button>

<button id="clearHistoryBtn">
🗑 Histórico
</button>

</div>

</div>

<ul id="historyList">

</ul>

</section>

</main>

<div id="toast" class="toast">
Operação realizada
</div>

<footer>

<p>
Universal Scanner Pro © 2026
</p>

</footer>

<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register(
"./service-worker.js"
);

});

}

</script>

</body>

</html>
