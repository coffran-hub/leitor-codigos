<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Universal Scanner Pro</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/@zxing/library@latest"></script>

</head>
<body>

<div class="container">

<header>
<h1>📷 Universal Scanner Pro</h1>
<p>QR Code + Todos os formatos de Código de Barras</p>
</header>

<div class="scanner-card">

<video id="video"></video>

<div class="controls">

<button id="startBtn">
▶ Iniciar Scanner
</button>

<button id="stopBtn">
⏹ Parar
</button>

<button id="flashBtn">
💡 Flash
</button>

<input type="file"
accept="image/*"
id="imageInput">

</div>

</div>

<div class="result-card">

<h2>Resultado</h2>

<textarea id="result"></textarea>

<div class="buttons">

<button id="copyBtn">
📋 Copiar
</button>

<button id="shareBtn">
📤 Compartilhar
</button>

<button id="searchBtn">
🔎 Pesquisar
</button>

</div>

</div>

<div class="history-card">

<h2>Histórico</h2>

<ul id="history"></ul>

<button id="exportBtn">
📁 Exportar CSV
</button>

</div>

</div>

<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

</body>
</html>
